{% load static %}
<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8"><title>Nexora - Kodni tasdiqlash</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
<main class="page-section">
    <div class="center-narrow">
        <section class="auth-shell">
            <form method="post">
                {% csrf_token %}
                <div class="auth-side">
                    <h1>Kodni kiriting</h1>
                    <p>Emailingizga yuborilgan 6 xonali kodni kiriting.</p>
                </div>
                <div class="auth-form stack">
                    <h2>Tasdiqlash</h2>
                    <input class="input" type="text" name="code" placeholder="000000" required>
                    <button type="submit" class="btn btn-primary">Tasdiqlash</button>
                </div>
            </form>
        </section>
    </div>
</main>
</body>
</html>
